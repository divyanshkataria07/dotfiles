###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

$terminal = kitty
$browser = firefox
$fileManager = nautilus
$music = spotify
$menu = rofi -show drun
$screenshot_area = grim -g "$(slurp)" - | wl-copy
$screenshot_full = grim - | wl-copy
$clipboard = cliphist list | rofi -dmenu | cliphist decode | wl-copy
$emoji = rofi -show emoji
$lock = uwsm app -- hyprlock
$sessionmenu = wlogout
