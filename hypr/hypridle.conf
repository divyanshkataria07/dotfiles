general {
    # Prevent duplicate lock instances
    lock_cmd = pidof hyprlock || uwsm app -- hyprlock

    # Ensure system locks before suspend
    before_sleep_cmd = loginctl lock-session

    # Restore screen after wake
    after_sleep_cmd = hyprctl dispatch dpms on

    # Critical for correct lock-before-suspend behavior
    inhibit_sleep = 3
}

# 🔒 Lock at 10 minutes (600s)
listener {
    timeout = 600
    on-timeout = uwsm app -- hyprlock
}

# 🖥️ Turn screen off AFTER lock (no flash issue)
listener {
    timeout = 620
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# 😴 Suspend at 3 hours (10800s)
listener {
    timeout = 10800
    on-timeout = systemctl suspend
}

