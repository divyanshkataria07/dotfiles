### KEYBINDS

### BASICS
bindsym $mod+Return exec $term
bindsym $mod+Shift+q kill
bindsym $mod+e exec $fileManager
bindsym $mod+d exec $menu
bindsym $mod+b exec $browser

# System / Noctalia
bindsym $mod+Mod1+l exec $lock
bindsym $mod+Mod1+q exec $sessionmenu
bindsym $mod+m exec $systemmonitor
bindsym $mod+i exec $settings
bindsym $mod+Shift+n exec $controlcenter
bindsym $mod+v exec $clipboard
bindsym $mod+period exec $emoji

# Reload / Exit
bindsym $mod+Shift+c reload
bindsym $mod+Shift+Escape exec swaynag -t warning -m "Exit Sway?" -B "Yes" "swaymsg exit"

# Floating
bindsym $mod+Shift+space floating toggle
floating_modifier $mod normal

# Fullscreen
bindsym $mod+f fullscreen toggle

### FOCUS (VIM KEYS)
bindsym $mod+$left focus left
bindsym $mod+$down focus down
bindsym $mod+$up focus up
bindsym $mod+$right focus right

### FOCUS (ARROW KEYS)
bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

### MOVE WINDOWS (VIM)
bindsym $mod+Shift+$left move left
bindsym $mod+Shift+$down move down
bindsym $mod+Shift+$up move up
bindsym $mod+Shift+$right move right

### MOVE WINDOWS (ARROWS)
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

### RESIZE
bindsym $mod+minus resize shrink width 40px
bindsym $mod+equal resize grow width 40px
bindsym $mod+Shift+minus resize shrink height 40px
bindsym $mod+Shift+equal resize grow height 40px

### WORKSPACES
bindsym $mod+1 workspace number 1
bindsym $mod+2 workspace number 2
bindsym $mod+3 workspace number 3
bindsym $mod+4 workspace number 4
bindsym $mod+5 workspace number 5
bindsym $mod+6 workspace number 6
bindsym $mod+7 workspace number 7
bindsym $mod+8 workspace number 8
bindsym $mod+9 workspace number 9
bindsym $mod+0 workspace number 10

### MOVE TO WORKSPACE
bindsym $mod+Shift+1 move container to workspace number 1
bindsym $mod+Shift+2 move container to workspace number 2
bindsym $mod+Shift+3 move container to workspace number 3
bindsym $mod+Shift+4 move container to workspace number 4
bindsym $mod+Shift+5 move container to workspace number 5
bindsym $mod+Shift+6 move container to workspace number 6
bindsym $mod+Shift+7 move container to workspace number 7
bindsym $mod+Shift+8 move container to workspace number 8
bindsym $mod+Shift+9 move container to workspace number 9
bindsym $mod+Shift+0 move container to workspace number 10

### WORKSPACE NAVIGATION
bindsym $mod+Tab workspace prev
bindsym $mod+Shift+Tab workspace next

### LAYOUT (Sway-specific, IMPORTANT)
bindsym $mod+Ctrl+h split h
bindsym $mod+Ctrl+v split v
bindsym $mod+s layout stacking
bindsym $mod+w layout tabbed
bindsym $mod+Ctrl+e layout toggle split
bindsym $mod+a focus parent

### SCRATCHPAD (replaces Hyprland special workspace)
bindsym $mod+Shift+minus move scratchpad
bindsym $mod+minus scratchpad show

### SCREENSHOTS
bindsym Print exec $screenshot_area
bindsym Shift+Print exec $screenshot_full

### MEDIA KEYS
bindsym --locked XF86AudioRaiseVolume exec $ipc volume increase
bindsym --locked XF86AudioLowerVolume exec $ipc volume decrease
bindsym --locked XF86AudioMute exec $ipc volume muteOutput
bindsym --locked XF86AudioMicMute exec $ipc volume muteInput

bindsym --locked XF86MonBrightnessUp exec $ipc brightness increase
bindsym --locked XF86MonBrightnessDown exec $ipc brightness decrease

bindsym --locked XF86AudioNext exec $ipc media next
bindsym --locked XF86AudioPause exec $ipc media playPause
bindsym --locked XF86AudioPlay exec $ipc media playPause
bindsym --locked XF86AudioPrev exec $ipc media previous

